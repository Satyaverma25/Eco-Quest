version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ecoquest-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - ecoquest-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoquest-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/ecoquest
      JWT_SECRET: ecoquest_geep_super_secret_jwt_key_2024
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:3001
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ecoquest-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoquest-seeder
    command: node utils/seeder.js
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongodb:27017/ecoquest
    networks:
      - ecoquest-network
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecoquest-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecoquest-network

volumes:
  mongo_data:
  uploads_data:

networks:
  ecoquest-network:
    driver: bridge
